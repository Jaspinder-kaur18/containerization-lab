pipeline {
    agent any

    stages {
        stage('Build Docker Image') {
            steps {
                sh 'docker build -t jaspinderkaur18/myapp .'
            }
        }

        stage('Push to Docker Hub') {
            steps {
                withCredentials([string(credentialsId: 'dockerhub-token', variable: 'TOKEN')]) {
                    sh 'echo $TOKEN | docker login -u jaspinderkaur18 --password-stdin'
                    sh 'docker push jaspinderkaur18/myapp'
                }
            }
        }
    }
}